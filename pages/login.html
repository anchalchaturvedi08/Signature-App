<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSign - Login</title>
    <link rel="shortcut icon" href="../assets/favicon/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>
        if (localStorage.getItem("currentUser")) {
            window.location.href = "../dashboard.html";
        }
    </script>
    <style>
        /* Specific adjustments for login to make it split screen or floating */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .auth-container-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            position: relative;
        }

        .auth-wrapper {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .auth-heading {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            background-size: 200% auto;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }

        .form-footer {
            margin-top: 25px;
        }
        
        .form-footer a {
            color: #6366f1;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Dynamic Background Orbs for Premium Feel -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="../index.html" class="brand">
            <img src="../logo.png" alt="QuickSign Logo" class="logo-img">
            <span class="logo">QuickSign</span>
        </a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../index.html#pricing">Pricing</a></li>
            <li><a href="../index.html#about">About Us</a></li>
        </ul>
        <button class="login-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </nav>

    <!-- Main Container -->
    <div class="auth-container-wrapper">
        <div class="auth-wrapper reveal-hidden">
            <h1 class="auth-heading">Welcome Back</h1>
            <p class="auth-subtitle">Log in to manage your digital signatures.</p>

            <form class="auth-form" onsubmit="_login(event)">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@company.com" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Login to QuickSign</button>
            </form>

            <div class="form-footer">
                <p><a href="forgot-password.html">Forgot Password?</a></p>
                <p style="margin-top: 10px;">Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <!-- Footer Section is reduced on login for cleaner UI -->

    <script src="../scripts/main.js"></script>
    <script>
        /* exported _login */
        function _login(event) {
            event.preventDefault();

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            let users = JSON.parse(localStorage.getItem("users")) || [];

            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem("currentUser", JSON.stringify(user));
                // Add a smooth redirection instead of alert
                const btn = event.target.querySelector('.auth-btn');
                btn.textContent = "Logging in...";
                btn.style.opacity = "0.8";
                setTimeout(() => {
                    window.location.href = "../dashboard.html";
                }, 500);
            } else {
                alert("Invalid credentials. Please try again.");
            }
        }
        
        // Ensure reveal triggers
        setTimeout(() => {
            document.querySelectorAll('.reveal-hidden').forEach(el => el.classList.add('reveal-visible'));
        }, 100);
    </script>
</body>

</html>
